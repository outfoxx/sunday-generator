openapi: 3.1.0
info:
  title: CLI Composed API
  version: 1.0.0
x-sunday-apiId: cli-composed
paths:
  /projects/{projectId}:
    get:
      operationId: getProject
      tags: [Projects]
      parameters:
      - name: projectId
        in: path
        required: true
        schema:
          type: string
      responses:
        "200":
          description: Project response.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Project"
  /events:
    get:
      operationId: streamEvents
      tags: [Events]
      responses:
        "200":
          description: Event stream framing response.
          content:
            text/event-stream:
              schema:
                type: string
components:
  schemas:
    Project:
      type: object
      required: [projectId]
      properties:
        projectId:
          type: string
        name:
          type: string
