asyncapi: "2.6.0"
info:
  title: Craft Events API
  version: "1.0.0"
x-sunday-apiId: craft
channels:
  /events:
    subscribe:
      operationId: streamProjectEvents
      message:
        name: ProjectEvent
        contentType: application/json
        payload:
          $ref: "#/components/schemas/ProjectEvent"
components:
  schemas:
    ProjectEvent:
      type: object
      required: [projectId]
      properties:
        projectId:
          type: string
