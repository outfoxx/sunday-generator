asyncapi: 2.6.0
info:
  title: Craft Events API
  version: 1.0.0
x-sunday-apiId: craft
channels:
  project.snapshot:
    x-sunday-service: projects
    subscribe:
      operationId: projectSnapshot
      message:
        name: Project
        contentType: application/json
        payload:
          $ref: "#/components/schemas/Project"
components:
  schemas:
    Project:
      type: object
      required:
        - changedAt
      properties:
        changedAt:
          type: string
