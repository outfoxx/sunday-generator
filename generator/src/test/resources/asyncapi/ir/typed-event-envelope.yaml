asyncapi: "2.6.0"
info:
  title: Craft Events API
  version: "1.0.0"
x-sunday-apiId: craft
channels:
  /events:
    x-sunday-service: craft
    subscribe:
      operationId: streamEvents
      message:
        name: EventEnvelope
        contentType: application/json
        payload:
          $ref: "#/components/schemas/EventEnvelope"
components:
  schemas:
    EventEnvelope:
      type: object
      required: [id, type, data]
      properties:
        id:
          type: string
        type:
          type: string
        data:
          $ref: "#/components/schemas/EventData"
    EventData:
      oneOf:
        - $ref: "#/components/schemas/ProjectCreatedData"
        - $ref: "#/components/schemas/ProjectDeletedData"
      discriminator:
        propertyName: type
        mapping:
          project.created: "#/components/schemas/ProjectCreatedData"
          project.deleted: "#/components/schemas/ProjectDeletedData"
    ProjectCreatedData:
      type: object
      required: [projectId]
      properties:
        projectId:
          type: string
    ProjectDeletedData:
      type: object
      required: [projectId]
      properties:
        projectId:
          type: string
