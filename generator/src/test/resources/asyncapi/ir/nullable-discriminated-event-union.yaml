asyncapi: "3.1.0"
info:
  title: Nullable Discriminated Event Union API
  version: "1.0.0"
channels:
  events:
    address: /events
    messages:
      event:
        $ref: "#/components/messages/EventMessage"
operations:
  streamEvents:
    action: receive
    x-sunday-service: Events
    channel:
      $ref: "#/channels/events"
    messages:
      - $ref: "#/channels/events/messages/event"
components:
  messages:
    EventMessage:
      name: EventEnvelope
      contentType: application/json
      payload:
        $ref: "#/components/schemas/EventEnvelope"
  schemas:
    EventEnvelope:
      oneOf:
        - type: "null"
        - $ref: "#/components/schemas/AccountsTeamCreatedEvent"
        - $ref: "#/components/schemas/NotificationsAnnouncementPublishedEvent"
      discriminator:
        propertyName: type
    AccountsTeamCreatedEvent:
      type: object
      required: [type, teamId]
      properties:
        type:
          const: accounts.team.created
        teamId:
          type: string
    NotificationsAnnouncementPublishedEvent:
      type: object
      required: [type, notificationId]
      properties:
        type:
          const: notifications.announcement.published
        notificationId:
          type: string
