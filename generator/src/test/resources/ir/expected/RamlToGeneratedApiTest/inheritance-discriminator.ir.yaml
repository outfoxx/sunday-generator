irVersion: "1"
name: "Inheritance API"
source:
  kind: "RAML"
  location: "SOURCE_LOCATION"
services:
- name: "InheritanceService"
  operations:
  - id: "getAnimal"
    method: "GET"
    path: "/animals/{animalId}"
    parameters:
    - name: "animalId"
      location: "PATH"
      type:
        kind: "SCALAR"
        name: "string"
      required: true
    responses:
    - status: 200
      type:
        kind: "NAMED"
        name: "Animal"
      mediaTypes:
      - "application/json"
    media:
      request:
      - "application/json"
      response:
      - "application/json"
  media:
    request:
    - "application/json"
    response:
    - "application/json"
models:
- name: "Animal"
  kind: "OBJECT"
  properties:
  - name: "kind"
    type:
      kind: "SCALAR"
      name: "string"
    required: true
  - name: "id"
    type:
      kind: "SCALAR"
      name: "string"
    required: true
  discriminator: "kind"
- name: "Cat"
  kind: "OBJECT"
  properties:
  - name: "huntingSkill"
    type:
      kind: "SCALAR"
      name: "string"
    required: true
    serializationName: "hunting-skill"
  inherits:
  - kind: "NAMED"
    name: "Animal"
  discriminatorValue: "cat"
- name: "Dog"
  kind: "OBJECT"
  properties:
  - name: "packSize"
    type:
      kind: "SCALAR"
      name: "integer"
    required: true
    serializationName: "pack-size"
  inherits:
  - kind: "NAMED"
    name: "Animal"
  discriminatorValue: "dog"
media:
  request:
  - "application/json"
  response:
  - "application/json"
