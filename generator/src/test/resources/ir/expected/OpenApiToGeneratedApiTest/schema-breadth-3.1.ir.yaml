irVersion: "1"
name: "Schema Breadth API"
source:
  kind: "OPENAPI"
  location: "SOURCE_LOCATION"
services:
- name: "SchemaBreadthService"
  baseUri: "https://api.example.com/v1"
  operations:
  - id: "listProjects"
    method: "GET"
    path: "/projects"
    parameters:
    - name: "pageSize"
      location: "QUERY"
      type:
        kind: "SCALAR"
        name: "integer"
      serializationName: "page-size"
      defaultValue: 25
      encoding:
        style: "form"
        explode: true
      validation:
        minimum: "1"
        maximum: "100"
    - name: "xTraceId"
      location: "HEADER"
      type:
        kind: "SCALAR"
        name: "string"
      serializationName: "X-Trace-Id"
      encoding:
        style: "simple"
      validation:
        minLength: "8"
        maxLength: "64"
    responses:
    - status: 200
      type:
        kind: "NAMED"
        name: "ProjectPage"
      mediaTypes:
      - "application/json"
      documentation:
        description: "Project page response."
    media: {}
  media: {}
models:
- name: "Metadata"
  kind: "MAP"
  aliases:
  - kind: "SCALAR"
    name: "string"
  additionalProperties:
    allowed: true
    type:
      kind: "SCALAR"
      name: "string"
- name: "Project"
  kind: "OBJECT"
  properties:
  - name: "id"
    type:
      kind: "SCALAR"
      name: "string"
    required: true
  - name: "displayName"
    type:
      kind: "SCALAR"
      name: "string"
    required: true
    serializationName: "display-name"
    validation:
      minLength: "3"
      maxLength: "80"
      pattern: "^[A-Za-z].*$"
  - name: "status"
    type:
      kind: "NAMED"
      name: "ProjectStatus"
    required: true
  - name: "owner"
    type:
      kind: "SCALAR"
      name: "string"
      nullable: true
  - name: "labels"
    type:
      kind: "NAMED"
      name: "ProjectLabels"
    validation:
      minItems: "1"
      maxItems: "10"
      uniqueItems: "true"
  - name: "metadata"
    type:
      kind: "NAMED"
      name: "Metadata"
  - name: "scope"
    type:
      kind: "NAMED"
      name: "ProjectScope"
- name: "ProjectLabels"
  kind: "ARRAY"
  aliases:
  - kind: "SCALAR"
    name: "string"
  collection: "SET"
  validation:
    minItems: "1"
    maxItems: "10"
    uniqueItems: "true"
- name: "ProjectPage"
  kind: "OBJECT"
  properties:
  - name: "pageSize"
    type:
      kind: "SCALAR"
      name: "integer"
    serializationName: "page-size"
    validation:
      minimum: "1"
      maximum: "100"
  - name: "items"
    type:
      kind: "ARRAY"
      name: "array"
      arguments:
      - kind: "NAMED"
        name: "Project"
    required: true
- name: "ProjectScope"
  kind: "OBJECT"
  properties:
  - name: "repoId"
    type:
      kind: "SCALAR"
      name: "string"
    required: true
  - name: "userId"
    type:
      kind: "SCALAR"
      name: "string"
    required: true
- name: "ProjectStatus"
  kind: "ENUM"
  values:
  - "active"
  - "archived"
media: {}
