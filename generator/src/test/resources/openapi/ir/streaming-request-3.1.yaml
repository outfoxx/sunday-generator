openapi: 3.1.0
info:
  title: Streaming Request API
  version: 1.0.0
paths:
  /archives:
    post:
      operationId: importArchive
      requestBody:
        x-sunday-streaming: client
        content:
          application/x-tar:
            schema:
              type: string
              format: binary
      responses:
        "202":
          description: Accepted import.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ImportAccepted"
components:
  schemas:
    ImportAccepted:
      type: object
      required:
        - importId
      properties:
        importId:
          type: string
