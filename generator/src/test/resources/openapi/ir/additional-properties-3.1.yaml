openapi: 3.1.0
info:
  title: Additional Properties API
  version: 1.0.0
servers:
  - url: https://api.example.com/v1
paths:
  /containers:
    get:
      operationId: getContainer
      responses:
        "200":
          description: Container response.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Container"
components:
  schemas:
    Container:
      type: object
      required:
        - id
        - typedLabels
        - freeformLabels
        - freeformItems
        - sealedLabels
      properties:
        id:
          type: string
        typedLabels:
          $ref: "#/components/schemas/TypedLabels"
        freeformLabels:
          $ref: "#/components/schemas/FreeformLabels"
        freeformItems:
          type: array
          items:
            type: object
            additionalProperties: true
        sealedLabels:
          $ref: "#/components/schemas/SealedLabels"
    TypedLabels:
      type: object
      properties:
        owner:
          type: string
      additionalProperties:
        type: string
        minLength: 1
    FreeformLabels:
      type: object
      additionalProperties: true
    SealedLabels:
      type: object
      properties:
        owner:
          type: string
      additionalProperties: false
