openapi: 3.1.0
info:
  title: Craft HTTP API
  version: 1.0.0
x-sunday-apiId: craft
paths:
  /scripts/{scriptId}:
    get:
      operationId: getScript
      tags:
        - Script
      parameters:
        - name: scriptId
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Script response.
          content:
            application/json:
              schema:
                type: object
                required:
                  - id
                properties:
                  id:
                    type: string
