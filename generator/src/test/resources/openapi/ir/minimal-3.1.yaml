openapi: 3.1.0
info:
  title: Minimal OpenAPI
  version: 1.0.0
servers:
  - url: https://api.example.com
paths:
  /tests/{id}:
    get:
      operationId: getTest
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: A test value.
          content:
            application/json:
              schema:
                type: string
