openapi: 3.1.0
info:
  title: Any JSON API
  version: 1.0.0
paths:
  /values:
    post:
      tags:
        - Narrative
      operationId: updateValue
      requestBody:
        content:
          application/json:
            schema: {}
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AnyJson'
  /properties:
    put:
      tags:
        - Narrative
      operationId: updateProperty
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/EntityStatePropertyMap'
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/EntityStatePropertyMap'
components:
  schemas:
    AnyJson: {}
    AnyHolder:
      type: object
      properties:
        value: {}
        documented:
          description: Any documented value
        named:
          $ref: '#/components/schemas/AnyJson'
    EntityStatePropertyType:
      type: string
      enum:
        - value
        - map
    EntityStateProperty:
      type: object
      required:
        - type
      discriminator:
        propertyName: type
        mapping:
          value: '#/components/schemas/EntityStatePropertyValue'
          map: '#/components/schemas/EntityStatePropertyMap'
      properties:
        type:
          $ref: '#/components/schemas/EntityStatePropertyType'
    EntityStatePropertyValue:
      allOf:
        - $ref: '#/components/schemas/EntityStateProperty'
        - type: object
          required:
            - enhancers
          properties:
            value: {}
            enhancers:
              type: array
              items:
                type: string
    EntityStatePropertyMap:
      allOf:
        - $ref: '#/components/schemas/EntityStateProperty'
        - type: object
          required:
            - properties
          properties:
            properties:
              type: object
              additionalProperties:
                $ref: '#/components/schemas/EntityStateProperty'
