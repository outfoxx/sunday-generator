openapi: 3.1.0
info:
  title: Craft HTTP API
  version: 1.0.0
x-sunday-apiId: craft
paths:
  /projects/{projectId}:
    x-sunday-service: projects
    get:
      operationId: fetchProject
      x-sunday-operationId: getProject
      parameters:
        - name: projectId
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Project response.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Project"
components:
  schemas:
    Project:
      type: object
      required:
        - id
      properties:
        id:
          type: string
